name: CI — Build & Push Docker Images

permissions:
  contents: read

on:
  push:
    branches: [staging, main]
    paths:
      - "services/**"
      - "packages/shared/**"
      - "package-json"
      - "package-lock.json"
      - "docker/**"
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'packages/shared/**'
              - 'docker/**'
            auth:
              - 'services/auth/**'
              - 'packages/shared/**'
              - 'docker/**'
            profile:
              - 'services/profile/**'
              - 'packages/shared/**'
              - 'docker/**'
            payment:
              - 'services/payment/**'
              - 'packages/shared/**'
              - 'docker/**'
            notification:
              - 'services/notification/**'
              - 'packages/shared/**'
              - 'docker/**'
            storage:
              - 'services/storage/**'
              - 'packages/shared/**'
              - 'docker/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          npm test --if-present

      - name: Determine image tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}-service:${{ github.sha }}
          cache-from: type=gha,scope{{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
