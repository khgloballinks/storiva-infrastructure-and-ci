name: Deploy to Production

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard - main branch only
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Production deploys must come from main branch"
            exit 1
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Pull latest code to get compose files on server
            cd /srv/myapp
            git pull origin main

            # Write prod env file
            cat > prod.env << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=latest
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            PROD_DB_HOST=${{ secrets.PROD_DB_HOST }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
            ENVEOF

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Pull latest images
            docker compose -p storiva-prod -f docker/docker-compose.prod.yml --env-file prod.env pull

            # Rolling restart — one service at a time
            for SERVICE in gateway auth profile payment notification storage; do
              echo "Restarting $SERVICE..."
              docker compose -p storiva-prod -f docker/docker-compose.prod.yml --env-file prod.env up -d --wait --no-deps $SERVICE
            done

            docker image prune -f
            sleep 8
            echo "Production deploy complete"
            docker compose -p storiva-prod -f docker/docker-compose.prod.yml ps
