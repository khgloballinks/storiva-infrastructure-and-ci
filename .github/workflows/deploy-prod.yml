name: Deploy to Production

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd /srv/myapp
            git fetch origin main
            git reset --hard origin/main

            echo "📝 Writing env file..."
            ENV_FILE=$(mktemp)
            cat > "$ENV_FILE" << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=latest
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            PROD_DB_HOST=${{ secrets.PROD_DB_HOST }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
            ENVEOF

            echo "🔐 Logging into Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            echo "💾 Saving current image state for rollback..."
            docker compose -p storiva-prod -f docker/docker-compose.prod.yml images > /tmp/pre-deploy-images.txt || true

            echo "📥 Pulling latest images..."
            docker compose -p storiva-prod -f docker/docker-compose.prod.yml --env-file "$ENV_FILE" pull

            echo "🚀 Rolling restart — one service at a time..."
            for SERVICE in gateway auth profile payment notification storage; do
              echo "  ↻ Restarting $SERVICE..."
              docker compose -p storiva-prod -f docker/docker-compose.prod.yml --env-file "$ENV_FILE" up -d --wait --no-deps $SERVICE
              echo "  ✅ $SERVICE restarted"
            done

            echo "🧹 Cleaning up..."
            rm -f "$ENV_FILE"
            docker image prune -f

            echo "⏳ Waiting for services to stabilize..."
            sleep 15

            echo "🔍 Checking service health..."
            UNHEALTHY=$(docker compose -p storiva-prod -f docker/docker-compose.prod.yml ps --format json | grep -c '"Health":"unhealthy"' || true)
            if [ "$UNHEALTHY" -gt 0 ]; then
              echo "❌ $UNHEALTHY unhealthy service(s) detected — check logs!"
              docker compose -p storiva-prod -f docker/docker-compose.prod.yml ps
              echo ""
              echo "💡 To rollback, SSH into the server and run:"
              echo "   docker compose -p storiva-prod -f docker/docker-compose.prod.yml up -d --no-deps <service>"
              echo "   with the previous image SHA from /tmp/pre-deploy-images.txt"
              exit 1
            fi

            echo "✅ Production deploy complete!"
            docker compose -p storiva-prod -f docker/docker-compose.prod.yml ps