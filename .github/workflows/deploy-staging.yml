name: Deploy to Staging

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    branches: [staging]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Pull latest code to get compose files on server
            cd /srv/myapp
            git pull origin staging

            # Write staging env file
            cat > staging.env << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=staging
            NGINX_PORT=8081
            NGINX_CONF=staging.conf
            NODE_ENV=staging
            POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_SECRET_KEY }}
            ENVEOF

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Deploy with project name for isolation (same compose file, different project)
            docker compose -p storiva-staging -f docker/docker-compose.dev.yml --env-file staging.env pull
            docker compose -p storiva-staging -f docker/docker-compose.dev.yml --env-file staging.env up -d --remove-orphans
            docker image prune -f

            sleep 8
            echo "Staging deploy complete"
            docker compose -p storiva-staging -f docker/docker-compose.dev.yml ps
