name: Deploy to Staging

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["CI — Build & Push Docker Images"]
    branches: [staging]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd /srv/myapp
            git fetch origin staging
            git reset --hard origin/staging

            echo "📝 Writing env file..."
            ENV_FILE=$(mktemp)
            cat > "$ENV_FILE" << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=staging
            NGINX_PORT=8080
            NGINX_CONF=staging.conf
            NODE_ENV=staging
            POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_SECRET_KEY }}
            ENVEOF

            echo "🔐 Logging into Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            echo "📥 Pulling latest images..."
            docker compose -p storiva-staging -f docker/docker-compose.staging.yml --env-file "$ENV_FILE" pull

            echo "🚀 Starting services..."
            docker compose -p storiva-staging -f docker/docker-compose.staging.yml --env-file "$ENV_FILE" up -d --remove-orphans

            echo "🧹 Cleaning up..."
            rm -f "$ENV_FILE"
            docker image prune -f

            echo "⏳ Waiting for services to stabilize..."
            sleep 15

            echo "🔍 Checking service health..."
            UNHEALTHY=$(docker compose -p storiva-staging -f docker/docker-compose.staging.yml ps --format json | grep -c '"Health":"unhealthy"' || true)
            if [ "$UNHEALTHY" -gt 0 ]; then
              echo "❌ $UNHEALTHY unhealthy service(s) detected!"
              docker compose -p storiva-staging -f docker/docker-compose.staging.yml ps
              exit 1
            fi

            echo "✅ Staging deploy complete!"
            docker compose -p storiva-staging -f docker/docker-compose.staging.yml ps