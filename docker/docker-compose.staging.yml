version: "3.8"

# ── Staging Environment ───────────────────────────────────────────────────────
# Server: EC2 Staging
# Port:   8081 (behind host Nginx → staging.storivainc.com)
# DB:     Local Postgres container

networks:
  app:
    driver: bridge

volumes:
  postgres-data:


services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - app

  gateway:
    image: ${DOCKERHUB_USERNAME}/gateway-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3000
      AUTH_SERVICE_URL: http://auth:3001
      PROFILE_SERVICE_URL: http://profile:3002
      PAYMENT_SERVICE_URL: http://payment:3003
      NOTIFICATION_SERVICE_URL: http://notification:3004
      STORAGE_SERVICE_URL: http://storage:3005
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  auth:
    image: ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  profile:
    image: ${DOCKERHUB_USERNAME}/profile-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  payment:
    image: ${DOCKERHUB_USERNAME}/payment-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  notification:
    image: ${DOCKERHUB_USERNAME}/notification-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app

  storage:
    image: ${DOCKERHUB_USERNAME}/storage-service:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app
