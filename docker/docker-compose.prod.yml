version: "3.8"

# ── Production Environment ────────────────────────────────────────────────────
# Domain:  storiva.com
# Ports:   Nginx → 80 (http) / 443 (https via certbot)
# DB:      AWS RDS (External)

networks:
  app:
    driver: bridge

volumes:
  certbot-www:
  certbot-conf:

services:

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - gateway
    networks:
      - app

  # ── Certbot (SSL) ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

  # ── Gateway ────────────────────────────────────────────────────────────────
  gateway:
    image: ${DOCKERHUB_USERNAME}/gateway-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth:3001
      PROFILE_SERVICE_URL: http://profile:3002
      PAYMENT_SERVICE_URL: http://payment:3003
      NOTIFICATION_SERVICE_URL: http://notification:3004
      STORAGE_SERVICE_URL: http://storage:3005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Auth ───────────────────────────────────────────────────────────────────
  auth:
    image: ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PROD_DB_HOST}/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Profile ────────────────────────────────────────────────────────────────
  profile:
    image: ${DOCKERHUB_USERNAME}/profile-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PROD_DB_HOST}/${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Payment ────────────────────────────────────────────────────────────────
  payment:
    image: ${DOCKERHUB_USERNAME}/payment-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PROD_DB_HOST}/${POSTGRES_DB}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Notification ───────────────────────────────────────────────────────────
  notification:
    image: ${DOCKERHUB_USERNAME}/notification-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PROD_DB_HOST}/${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Storage ────────────────────────────────────────────────────────────────
  storage:
    image: ${DOCKERHUB_USERNAME}/storage-service:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PROD_DB_HOST}/${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
